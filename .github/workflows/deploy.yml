name: CI / Deploy to GitHub Pages

on:
  push:
    branches: [main]
  pull_request:

# Allow one concurrent deployment; cancel in-progress runs on new pushes
concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Lint, Build, Test ──────────────────────────────────────────────────────
  ci:
    name: Lint → Build → Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint (ESLint)
        run: npm run lint

      - name: Type-check (tsc --noEmit)
        run: npx tsc --noEmit

      - name: Build (Vite)
        run: npm run build

      - name: Unit tests (Vitest)
        run: npm test

      - name: Validate archipelago.json (Python)
        run: python scripts/validate_data.py

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: E2E tests (Playwright)
        run: npm run test:e2e

      # Upload the built artifact so the deploy job can use it
      - name: Upload Pages artifact
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  # ── Deploy (only on push to main after CI passes) ─────────────────────────
  deploy:
    name: Deploy to GitHub Pages
    needs: ci
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
