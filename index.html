<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cartografía Estética</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&family=Crimson+Pro:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    /* ── Reset ── */
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    /* ── Base ── */
    :root {
      --bg:       #0d0b08;
      --text:     #d4c8a8;
      --accent:   #c4b07a;
      --active:   #e8b060;
      --grid:     rgba(180,160,100,0.045);
      --diagonal: rgba(180,160,100,0.022);
      --compass:  #c4b07a;
    }

    html, body {
      width: 100%;
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Crimson Pro', 'Georgia', serif;
      overflow: hidden;
    }

    /* ── Intro container ── */
    #intro-container {
      position: fixed;
      inset: 0;
      z-index: 50;
      background: var(--bg);
      overflow-y: scroll;
      scroll-snap-type: y mandatory;
      scrollbar-width: none;
    }
    #intro-container::-webkit-scrollbar { display: none; }

    /* ── Map container ── */
    #map-container {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }

    /* Canvas and SVG fill the viewport, stacked */
    #map-bg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
    }

    #network {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      overflow: visible;
    }

    /* ── Top bar ── */
    #top-bar {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 24px;
      background: linear-gradient(to bottom, rgba(13,11,8,0.85) 0%, transparent 100%);
      pointer-events: none;
    }

    #top-bar h1 {
      font-family: 'IM Fell English', 'Georgia', serif;
      font-size: 1.1rem;
      font-weight: 400;
      color: var(--accent);
      letter-spacing: 0.04em;
      pointer-events: auto;
    }

    /* ── Lens panel ── */
    #lens-panel {
      position: absolute;
      top: 56px;
      left: 20px;
      z-index: 10;
      display: flex;
      flex-direction: column;
      gap: 4px;
      max-width: 220px;
    }

    #lens-panel button {
      background: rgba(13,11,8,0.75);
      border: 1px solid rgba(196,176,122,0.2);
      color: var(--text);
      font-family: 'Crimson Pro', 'Georgia', serif;
      font-size: 0.82rem;
      padding: 5px 12px;
      cursor: pointer;
      text-align: left;
      transition: border-color 0.2s, color 0.2s, background 0.2s;
      backdrop-filter: blur(4px);
    }

    #lens-panel button:hover {
      border-color: rgba(196,176,122,0.5);
      color: var(--accent);
    }

    #lens-panel button.active {
      border-color: var(--active);
      color: var(--active);
      background: rgba(232,176,96,0.08);
    }

    /* ── Region filter ── */
    #region-filter {
      position: absolute;
      bottom: 56px;
      left: 20px;
      z-index: 10;
      display: flex;
      flex-direction: column;
      gap: 4px;
      max-width: 200px;
    }

    #region-filter button {
      background: rgba(13,11,8,0.75);
      border: 1px solid rgba(196,176,122,0.15);
      color: rgba(212,200,168,0.7);
      font-family: 'Crimson Pro', 'Georgia', serif;
      font-size: 0.78rem;
      padding: 4px 10px;
      cursor: pointer;
      text-align: left;
      transition: border-color 0.2s, color 0.2s;
      backdrop-filter: blur(4px);
    }

    #region-filter button:hover {
      border-color: rgba(196,176,122,0.4);
      color: var(--text);
    }

    #region-filter button.active {
      border-color: var(--accent);
      color: var(--accent);
    }

    /* ── Info panel ── */
    #info-panel {
      position: absolute;
      top: 56px;
      right: 20px;
      z-index: 10;
      width: 260px;
      background: rgba(13,11,8,0.82);
      border: 1px solid rgba(196,176,122,0.18);
      padding: 18px 20px;
      backdrop-filter: blur(8px);
      transition: opacity 0.3s;
    }

    #info-panel .info-tag {
      font-size: 0.65rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
      opacity: 0.65;
      margin-bottom: 6px;
    }

    #info-panel .info-name {
      font-family: 'IM Fell English', 'Georgia', serif;
      font-size: 1.15rem;
      color: var(--active);
      margin-bottom: 8px;
      line-height: 1.25;
    }

    #info-panel .info-meta {
      font-size: 0.75rem;
      color: rgba(212,200,168,0.55);
      margin-bottom: 6px;
    }

    #info-panel .info-concept {
      font-size: 0.85rem;
      color: var(--text);
      line-height: 1.55;
      font-style: italic;
    }

    /* ── Formula display ── */
    #formula-display {
      position: absolute;
      bottom: 20px;
      right: 20px;
      z-index: 10;
      font-family: 'IM Fell English', 'Georgia', serif;
      font-size: 0.78rem;
      color: rgba(196,176,122,0.38);
      letter-spacing: 0.06em;
      pointer-events: none;
    }

    /* ── Error screen ── */
    #error-screen {
      position: absolute;
      inset: 0;
      background: rgba(13,11,8,0.96);
      z-index: 100;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px;
    }

    #error-screen.hidden {
      display: none;
    }

    #error-screen h2 {
      font-family: 'IM Fell English', 'Georgia', serif;
      font-size: 1.3rem;
      color: #c87070;
      margin-bottom: 12px;
    }

    #error-screen p {
      font-size: 0.9rem;
      color: rgba(212,200,168,0.7);
      margin-bottom: 24px;
      max-width: 480px;
      line-height: 1.6;
    }

    #retry-button {
      padding: 10px 28px;
      background: rgba(196,176,122,0.08);
      border: 1px solid rgba(196,176,122,0.3);
      color: var(--text);
      font-family: 'Crimson Pro', 'Georgia', serif;
      font-size: 0.9rem;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s;
    }

    #retry-button:hover {
      background: rgba(196,176,122,0.16);
      border-color: var(--accent);
    }

    /* ── SVG node/edge styles ── */
    .arch-node {
      fill: var(--accent);
      opacity: 0.75;
      cursor: pointer;
      transition: opacity 0.3s;
    }

    .arch-node:hover { opacity: 1; }

    .faro-node {
      fill: var(--text);
      opacity: 0.7;
      cursor: pointer;
      transition: opacity 0.3s;
    }

    .faro-node.active {
      fill: var(--active);
      opacity: 1;
    }

    .faro-node:hover { opacity: 1; }

    .node-label {
      font-family: 'Crimson Pro', 'Georgia', serif;
      font-size: 10px;
      fill: var(--text);
      opacity: 0.6;
      pointer-events: none;
      transition: opacity 0.3s;
    }

    .edge-connection {
      stroke: rgba(196,176,122,0.12);
      stroke-width: 0.6;
      opacity: 0.6;
      transition: stroke 0.3s, stroke-width 0.3s, opacity 0.3s, stroke-opacity 0.3s;
    }

    .edge-connection.active {
      stroke: #e8b060;
      stroke-width: 1.5;
      opacity: 0.9;
    }

    .edge-tether {
      stroke: rgba(196,176,122,0.18);
      stroke-width: 0.8;
      stroke-dasharray: 3 4;
      opacity: 0.18;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <!-- Intro section (scrollytelling) -->
  <div id="intro-container"></div>

  <!-- Map section (hidden until intro completes) -->
  <div id="map-container" style="display:none">
    <canvas id="map-bg"></canvas>
    <svg id="network" aria-label="Red de pensadores estéticos"></svg>

    <div id="top-bar">
      <h1>Cartografía Estética</h1>
    </div>

    <div id="lens-panel" aria-label="Filtro por lente"></div>

    <div id="region-filter" aria-label="Filtro por región"></div>

    <div id="info-panel" role="complementary" aria-label="Información del nodo seleccionado">
      <div class="info-tag">Cartografía Estética</div>
      <div class="info-name">Explora el mapa</div>
      <div class="info-concept">Haz clic en un faro o archipiélago para ver su información.</div>
    </div>

    <div id="formula-display" aria-hidden="true">vista = región · faro · lente</div>

    <div id="error-screen" class="hidden" role="alert">
      <h2 id="error-title">Error al cargar</h2>
      <p id="error-message"></p>
      <button id="retry-button">Reintentar</button>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
